name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'public/**'
      - 'assets/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
      url: https://trianum.trinos.group
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Stage static site
        run: |
          set -euo pipefail
          mkdir -p _site
          # Copy the landing page and any static assets if present.
          cp index.html _site/
          if [ -d public ]; then cp -R public/. _site/; fi
          if [ -d assets ]; then cp -R assets _site/assets; fi
          ls -la _site

      - name: Publish with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=trianum-landing --branch=main --commit-dirty=true
